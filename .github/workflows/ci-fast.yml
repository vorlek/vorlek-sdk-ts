name: CI (fast)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-fast-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate types
        env:
          VORLEK_OPENAPI_SOURCE: https://vorlek.dev/openapi.json
        run: pnpm types:generate

      - name: Check generated type drift
        run: git diff --exit-code src/types.generated.ts

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
